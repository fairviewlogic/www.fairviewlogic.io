baseURL = "/maintenance/"
locale = "en-gb"
title = "Fairview Logic"
themesDir = "themes"
theme = "hugo-hero-theme"
disableKinds = ["page", "section", "taxonomy", "term", "RSS", "sitemap", "robotsTXT", "404"]

# Builds a single maintenance/holding page only. Switch to this config by
# running: hugo --environment maintenance --minify
# Point the bucket / Pages host's index and 404 at the same generated page
# while the main site is offline.

[module]
  [module.hugoVersion]
    extended = true
    min = "0.92.0"
    
[params]
  google_analytics_id=""

  [params.logo]
    mobile = "images/fl-logo-mobile.svg"
    mobile_height = "36px"
    mobile_width = "36px"
    desktop = "images/fl-logo.svg"
    desktop_height = "29px"
    desktop_width = "217px"
    alt = "Fairview Logic"