name: Deploy www to Pages

# Rewritten from Hugoplate's inherited workflow. Fixes:
# - Removed 'npm run project-setup' — already done locally, re-running
#   in CI reorganises the repo again and breaks the build
# - Removed hard-coded wget installs for Hugo/Go with a mismatched
#   ARM/AMD tarball; use setup-* actions with correct arch detection
# - Removed unused TINA_* env vars (TinaCMS not integrated)
# - Bumped Hugo 0.158.0 -> 0.161.1, Go 1.23.3 -> 1.25
# - Added workflow_dispatch for manual retry, plus a pages concurrency
#   group so overlapping deploys queue instead of racing

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Hugoplate declares ~25 gethugothemes/hugo-modules/* dependencies
      # in go.mod — resolved at build time.
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      # package-lock.json is .gitignore'd by Hugoplate's default, so npm ci
      # would fail. Switch to npm ci here once we commit the lockfile.
      - name: Install npm dependencies
        run: npm install

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # `npm run build` = themeGenerator.js (Tailwind extraction) then
      # `hugo --gc --minify --templateMetrics --templateMetricsHints
      #  --forceSyncStatic`. Do NOT call bare `hugo` here — the CSS
      # would be stale.
      - name: Build with Hugo (via Hugoplate's npm chain)
        env:
          HUGO_ENVIRONMENT: production
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
